# Moola Configuration
#
# Training Mode: 2-class (consolidation vs retracement)
#   - Current: 2 classes (consolidation: 65, retracement: 50) = 115 samples
#   - Reversal class removed due to insufficient samples (19 → need 150+)
#
# Data Files:
#   - data/processed/train.parquet → 115 samples, 2 classes (CURRENT)
#   - data/processed/reversal_holdout.parquet → 19 reversal samples (ARCHIVED)
#   - data/processed/train_3class_backup.parquet → 134 samples, 3 classes (BACKUP)
#
# To restore 3-class training:
#   cp data/processed/train_3class_backup.parquet data/processed/train.parquet
#
# Note: Model architecture automatically adapts to num_classes via len(np.unique(y))

moola:
  run_id: ${env:MOOLA_RUN_ID, "dev"}
  env: ${env:MOOLA_ENV, "local"}
paths:
  data: ${env:MOOLA_DATA_DIR, "./data"}
  artifacts: ${env:MOOLA_ARTIFACTS_DIR, "./data/artifacts"}
  logs: ${env:MOOLA_LOG_DIR, "./data/logs"}

seed: 1337
logging:
  level: INFO
